name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:

  build-api:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ftest1_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Restore dependencies
        run: dotnet restore ftest1.Notes.Api/

      - name: Build API
        run: dotnet build ftest1.Notes.Api/ --no-restore
        env:
          ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=ftest1_db;Username=postgres;Password=postgres"

  build-ui:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: f1test.Notes.Web/

      - name: Build UI
        run: npm run build
        working-directory: f1test.Notes.Web/
